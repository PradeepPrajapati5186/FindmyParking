{% extends 'base.html' %}

{% block title %}Complete Payment - Findmy Parking{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="card border-0 shadow-sm p-4 p-md-5 w-100" style="max-width: 500px;">
        <div class="text-center mb-4">
            <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                <i class="bi bi-wallet fs-3"></i>
            </div>
            <h2 class="fw-bold fs-3">Payment Details</h2>
            <p class="text-muted mb-0">Booking Ref: <span class="fw-semibold text-dark">{{ reservation.booking_reference }}</span></p>
        </div>

        <div class="bg-light rounded-3 p-4 text-center mb-4">
            <div class="text-muted small fw-semibold text-uppercase mb-1">Amount Due</div>
            <h1 class="text-success fw-bold mb-0 display-5">&#8377;{{ reservation.total_amount }}</h1>
        </div>

        <div class="d-flex justify-content-between mb-4 pb-4 border-bottom">
            <span class="text-muted fw-medium">Parking Slot</span>
            <span class="fw-bold">{{ reservation.parking_slot.slot_number }}</span>
        </div>
        
        <form action="{% url 'verify_payment' %}" method="POST" class="d-grid">
            <script
                src="https://checkout.razorpay.com/v1/checkout.js"
                data-key="{{ razorpay_merchant_key }}"
                data-amount="{{ razorpay_amount }}"
                data-currency="{{ currency }}"
                data-order_id="{{ razorpay_order_id }}"
                data-buttontext="Pay Now"
                data-name="Findmy Parking"
                data-description="Parking Reservation Payment"
                data-prefill.name="{{ request.user.firstname }} {{ request.user.lastname }}"
                data-prefill.email="{{ request.user.email }}"
                data-prefill.contact="{{ request.user.phonenumber }}"
                data-theme.color="#3b82f6">
            </script>
        </form>
    </div>
</div>
{% endblock %}
